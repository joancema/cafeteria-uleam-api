<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafetería ULEAM — CRUD de Productos</title>
  <style>
    :root { --cyan: #00ADD8; --bg: #0f1419; --panel: #1a2029; --txt: #e6edf3; --muted: #8b949e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--txt); padding: 24px; }
    h1 { color: var(--cyan); font-size: 22px; }
    .panel { background: var(--panel); border: 1px solid #2d333b; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 8px 0 4px; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #2d333b; background: #0d1117; color: var(--txt); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 120px; }
    button { background: var(--cyan); color: #00161d; border: 0; border-radius: 6px; padding: 9px 14px; font-weight: bold; cursor: pointer; margin-top: 12px; }
    button.sec { background: #2d333b; color: var(--txt); }
    button.danger { background: #f85149; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2d333b; font-size: 14px; }
    th { color: var(--muted); font-weight: normal; }
    .acciones button { margin: 0 4px 0 0; padding: 5px 10px; font-size: 12px; }
    #estado { font-size: 13px; color: var(--muted); min-height: 18px; }
  </style>
</head>
<body>
  <h1>☕ Cafetería ULEAM — Productos</h1>
  <p id="estado">Cargando…</p>

  <div class="panel">
    <strong id="form-titulo">Nuevo producto</strong>
    <input type="hidden" id="id" />
    <div class="row">
      <div><label>Nombre</label><input id="nombre" /></div>
      <div><label>Precio</label><input id="precio" type="number" step="0.01" /></div>
      <div><label>Stock</label><input id="stock" type="number" /></div>
      <div><label>Categoría ID</label><input id="categoria_id" type="number" /></div>
    </div>
    <button onclick="guardar()">Guardar</button>
    <button class="sec" onclick="limpiar()">Limpiar</button>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Cat.</th><th></th></tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>

  <script>
    const API = "http://localhost:8080/api/v1/productos";
    const $ = (id) => document.getElementById(id);
    const estado = (msg) => { $("estado").textContent = msg; };

    async function listar() {
      estado("Cargando…");
      const res = await fetch(API);
      const productos = await res.json();
      const tbody = $("tabla");
      tbody.innerHTML = "";
      (productos || []).forEach((p) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.id}</td><td>${p.nombre}</td><td>$${p.precio}</td>
          <td>${p.stock}</td><td>${p.categoria_id}</td>
          <td class="acciones">
            <button class="sec" onclick='editar(${JSON.stringify(p)})'>Editar</button>
            <button class="danger" onclick="borrar(${p.id})">Borrar</button>
          </td>`;
        tbody.appendChild(tr);
      });
      estado(`${(productos || []).length} producto(s).`);
    }

    function editar(p) {
      $("id").value = p.id;
      $("nombre").value = p.nombre;
      $("precio").value = p.precio;
      $("stock").value = p.stock;
      $("categoria_id").value = p.categoria_id;
      $("form-titulo").textContent = "Editar producto #" + p.id;
    }

    function limpiar() {
      $("id").value = "";
      $("nombre").value = $("precio").value = $("stock").value = $("categoria_id").value = "";
      $("form-titulo").textContent = "Nuevo producto";
    }

    async function guardar() {
      const id = $("id").value;
      const cuerpo = {
        nombre: $("nombre").value,
        precio: parseFloat($("precio").value) || 0,
        stock: parseInt($("stock").value) || 0,
        categoria_id: parseInt($("categoria_id").value) || 0,
      };
      const opts = {
        method: id ? "PUT" : "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cuerpo),
      };
      await fetch(id ? `${API}/${id}` : API, opts);
      limpiar();
      listar();
    }

    async function borrar(id) {
      await fetch(`${API}/${id}`, { method: "DELETE" });
      listar();
    }

    listar();
  </script>
</body>
</html>
